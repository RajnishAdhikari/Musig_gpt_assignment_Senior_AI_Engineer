services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: musicgpt-search-postgres
    environment:
      POSTGRES_USER: musicgpt
      POSTGRES_PASSWORD: musicgpt
      POSTGRES_DB: musicgpt_search
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicgpt -d musicgpt_search"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
